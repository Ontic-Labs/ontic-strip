# ============================
# Risks & open questions
# ============================
risks:
  - id: r1
    risk: "LLM quality on Portuguese text"
    detail: >
      Gemini 2.5 Flash and Flash Lite perform well on Portuguese but have
      not been benchmarked on CFPO-style prompts.  The A/B test in Phase 5
      will surface any quality gaps.
    mitigation: >
      If quality is poor, consider swapping to a model with stronger
      Portuguese performance for specific prompts (registry locale override).

  - id: r2
    risk: "Ideology axis calibration for Brazil"
    detail: >
      The MBFC-derived economic/social axes map imperfectly to Brazilian
      politics (e.g., Bolsonarismo blends economic liberalism with social
      conservatism differently than US equivalents).
    mitigation: >
      Consult Brazilian political science framing.  The pt-BR override
      should recalibrate examples on both axes for local context.

  - id: r3
    risk: "Veracity web search in Portuguese"
    detail: >
      Perplexity / Sonar (used for veracity-web) may have weaker coverage
      of Brazilian sources compared to English.
    mitigation: >
      Test Perplexity's Portuguese source retrieval.  If insufficient,
      consider adding explicit search URL hints for Brazilian domains
      (.gov.br, folha.uol.com.br, etc.) in the prompt.

  - id: r4
    risk: "Story clustering across languages"
    detail: >
      If EN and pt-BR articles cover the same event, they may or may not
      cluster together.  Current embedding model's cross-lingual capability
      determines this.
    mitigation: >
      Out of scope for this plan.  Evaluate cross-lingual clustering
      separately; may need locale-scoped clustering.

